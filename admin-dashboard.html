<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!----------------------- Bootstrap Link ---------------------------->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
    <nav class="navbar shadow-lg fixed-top bg-white">
        <div class="container-fluid">
            <a class="navbar-brand text-primary" href="#">Admin Dashboard</a>
            <div class="role-logged-out" id="nav-links">
                <ul class="nav nav-pills justify-content-end" >
                    <li class="nav-item">
                        <a class="nav-link" href="">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="" data-bs-toggle="modal" data-bs-target="#searchBar">Search</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="">Students</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="" data-bs-toggle="modal" data-bs-target="#sitinForm">Sit-in</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="">View Sit-in Records</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Sit-in Reports</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Feedback and Reports</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Reservation</a>
                    </li>
                    <button class="btn btn-outline-danger">Log Out</button>
                </ul>
            </div>
        </div>
    </nav>

    <!----- Search Bar ----->
    <div class="modal fade" id="searchBar" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
            <div class="modal-header">
                <h1 class="modal-title fs-5" id="exampleModalLabel">Search Students</h1>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="input-group mb-3">
                    <input type="text" class="form-control" placeholder="Search..." aria-label="Search input with button">
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-primary">Save changes</button>
            </div>
            </div>
        </div>
    </div>

    <div class="container-fluid mt-5 pt-5 px-5">
        <div class="row row-cols-1 row-cols-md-2 g-4">

            <div class="col-lg-6">
            <div class="card h-100 shadow">
                <div class="card-header text-bg-primary">Statistics</div>
                <div class="card-body">
                    <p>Student Registered: </p>
                    <p>Currently Sit-in: </p>
                    <p>Total Sit-in: </p>
                </div>
            </div>
            </div>

            <div class="col-lg-6">
            <div class="card h-100 shadow">
                <div class="card-header text-bg-primary">Announcement</div>
                <div class="card-body">
                    <p>New Announcement</p>
                </div>
            </div>
            </div>
        </div>
    </div>


</body>
</html>
