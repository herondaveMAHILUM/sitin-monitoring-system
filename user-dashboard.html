<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar shadow-lg fixed-top bg-white">
        <div class="container-fluid">
            <a class="navbar-brand text-primary" href="#">Dashboard</a>
            <ul class="nav nav-pills justify-content-end">
                <li class="nav-item"><a class="nav-link" href="user-dashboard.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="user-editprofile.html">Edit Profile</a></li>
                <li class="nav-item"><a class="nav-link" href="#">History</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Reservation</a></li>
                <li class="nav-item"><a href="index.html"><button class="btn btn-outline-danger">Log Out</button></a></li>
            </ul>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container-fluid mt-5 pt-5 px-5">
        <div class="row row-cols-1 row-cols-md-2 g-4">

            <!-- Student Info -->
            <div class="col-lg-4">
                <div class="card h-100 shadow">
                    <div class="card-header text-bg-primary">Student Information</div>
                    <div class="card-body text-center">
                        <img src="assets/profile.jpg" class="rounded-circle border border-primary" width="150" height="150">
                    </div>
                    <div class="card-body">
                        <p>Name: <span id="studentName"></span></p>
                        <p>Course: <span id="studentCourse"></span></p>
                        <p>Year: <span id="studentYear"></span></p>
                        <p>Email: <span id="studentEmail"></span></p>
                        <p>Address: <span id="studentAddress"></span></p>
                        <p>Sessions: <span id="studentSessions"></span></p>
                    </div>
                </div>
            </div>

            <!-- Announcement -->
            <div class="col-lg-4">
                <div class="card h-100 shadow">
                    <div class="card-header text-bg-primary">Announcement</div>
                    <div class="card-body">
                        <p>CCS Admin</p>
                    </div>
                </div>
            </div>

            <!-- Rules -->
            <div class="col-lg-4">
                <div class="card h-100 shadow">
                    <div class="card-header text-bg-primary">Rules and Regulations</div>
                    <div class="card-body text-center">
                        <p>Be punctual. Follow instructions.</p>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Toast -->
    <div class="position-fixed start-50 translate-middle-x p-3" style="top: 50px; z-index: 11;">
        <div id="liveToast" class="toast align-items-center text-bg-success border-0" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body" id="toastBody">Toast message</div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
