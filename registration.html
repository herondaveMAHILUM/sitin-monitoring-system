<!DOCTYPE html>
<html>
<head>
    <!----------------------- Bootstrap Link ---------------------------->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body style="padding-top: 225px; background-color:#b6d4fe;">

    <nav class="navbar shadow-lg fixed-top bg-white">
        <div class="container-fluid">
            <a class="navbar-brand text-primary" href="#">
            <img src="assests/uclogo.png" alt="Logo" width="49" height="31" class="d-inline-block align-text-top">
            College of Computer Studies Sit-in Monitoring System
            </a>
            <div class="role-logged-out" id="nav-links">
                <ul class="nav nav-pills justify-content-end" >
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">About</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="login.html">Log In</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="registration.html">Register</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container p-5 rounded-4 shadow-lg border col-12 col-md-6 col-lg-4 bg-white">
        <h3 class="mb-4">Register</h3>
        <label for="idNumber" class="form-label">ID Number</label>
        <input type="number" class="form-control mb-4" id="idNumber">
        <label for="lastName" class="form-label">Last Name</label>
        <input type="text" class="form-control mb-4" id="lastName">
        <label for="firstName" class="form-label">First Name</label>
        <input type="text" class="form-control mb-4" id="firstName">   
        <label for="middleName" class="form-label">Middle Name</label>
        <input type="text" class="form-control mb-4" id="middleName">
        <label for="courseLevel" class="form-label">Course Level</label>
        <select class="form-control mb-4" id="courseLevel">
            <option value="">Select Course Level</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
        </select>
        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-control mb-4" id="password">
        <label for="confirmPassword" class="form-label">Confirm Password</label>
        <input type="password" class="form-control mb-4" id="confirmPassword">
        <label for="email" class="form-label">Email</label>
        <input type="email" class="form-control mb-4" id="email">
        <label for="course" class="form-label">Course</label>
        <select class="form-control mb-4" id="course">
            <option value="">Select Course</option>
            <option value="BSA">BSA</option>
            <option value="BSBA">BSBA</option>
            <option value="BSIT">BSIT</option>
            <option value="BSCS">BSCS</option>
            <option value="BSCpE">BSCpE</option>
            <option value="BS Crim">BS Crim</option>
            <option value="BSCE">BSCE</option>
            <option value="BSEE">BSEE</option>
            <option value="BSME">BSME</option>
            <option value="BSIE">BSIE</option>
            <option value="BSC">BSC</option>
            <option value="BSHRM">BSHRM</option>
            <option value="BSTM">BSTM</option>
            <option value="BSEEd">BSEEd</option>
            <option value="BSSecEd">BSSecEd</option>
            <option value="BSCA">BSCA</option>
            <option value="BSIP">BSIP</option>
            <option value="BSREM">BSREM</option>
            <option value="BSOA">BSOA</option>
        </select>
        <label for="address" class="form-label">Address</label>
        <input type="text" class="form-control mb-4" id="address">
        <button id="registerBtn" class="btn btn-success">Sign Up</button>
        <button type="button" class="btn btn-secondary btn" onclick="window.location.href='index.html'">Cancel</button>
    </div>
    
    <div class="position-fixed start-50 translate-middle-x p-3" style="top: 50px; z-index: 11;">
    <div id="liveToast" class="toast align-items-center text-bg-danger border-0" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="d-flex">
        <div class="toast-body" id="toastBody">
            Toast message
        </div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
    </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
