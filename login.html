<!DOCTYPE html>
<html>
<head>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body style="padding-top: 150px; background-color:#b6d4fe;">

<nav class="navbar shadow-lg fixed-top bg-white">
    <div class="container-fluid">
        <a class="navbar-brand text-primary">
            <img src="assests/uclogo.png" width="49" height="31">
            College of Computer Studies Sit-in Monitoring System
        </a>

        <div id="nav-links">
            <ul class="nav nav-pills justify-content-end">
                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link">About</a></li>
                <li class="nav-item"><a class="nav-link" href="login.html">Log In</a></li>
                <li class="nav-item"><a class="nav-link" href="registration.html">Register</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container p-5 rounded-4 shadow-lg border col-12 col-md-6 col-lg-4 bg-white">
    <h3 class="mb-4">Log In</h3>

    <input type="email" class="form-control mb-4" id="loginEmail">
    <input type="password" class="form-control mb-4" id="loginPassword">

    <a class="nav-link mb-3 text-primary" href="registration.html">Register Here</a>

    <button id="loginBtn" class="btn bg-success p-2 text-white">Log In</button>
    <button class="btn btn-secondary" onclick="window.location.href='index.html'">Cancel</button>
</div>

<div class="position-fixed start-50 translate-middle-x p-3" style="top: 50px; z-index: 11;">
    <div id="liveToast" class="toast align-items-center text-bg-danger border-0" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="d-flex">
        <div class="toast-body" id="toastBody">
            Toast message
        </div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
