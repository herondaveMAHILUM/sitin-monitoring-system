<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="padding-top: 150px; background-color:#b6d4fe;">

    <!-- Navbar -->
    <nav class="navbar shadow-lg fixed-top bg-white">
        <div class="container-fluid">
            <a class="navbar-brand text-primary" href="user-dashboard.html">Dashboard</a>
            <ul class="nav nav-pills justify-content-end">
                <li class="nav-item"><a class="nav-link" href="user-dashboard.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Edit Profile</a></li>
                <li class="nav-item"><a class="nav-link" href="#">History</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Reservation</a></li>
                <li class="nav-item"><a href="index.html"><button class="btn btn-outline-danger">Log Out</button></a></li>
            </ul>
        </div>
    </nav>

    <!-- Form -->
    <div class="container p-5 rounded-4 shadow-lg border col-12 col-md-6 col-lg-4 bg-white mt-5 pt-5">
        <h3 class="mb-4">Edit Profile</h3>

        <label>ID Number</label>
        <input type="number" class="form-control mb-3" id="idNumber">

        <label>Last Name</label>
        <input type="text" class="form-control mb-3" id="lastName">

        <label>First Name</label>
        <input type="text" class="form-control mb-3" id="firstName">

        <label>Middle Name</label>
        <input type="text" class="form-control mb-3" id="middleName">

        <label>Course Level</label>
        <select class="form-control mb-3" id="courseLevel">
            <option value="">Select Course Level</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
        </select>

        <label>Password</label>
        <input type="password" class="form-control mb-3" id="password">

        <label>Confirm Password</label>
        <input type="password" class="form-control mb-3" id="confirmPassword">

        <label>Email</label>
        <input type="email" class="form-control mb-3" id="email">

        <label>Course</label>
        <select class="form-control mb-3" id="course">
            <option value="">Select Course</option>
            <option value="BSIT">BSIT</option>
            <option value="BSCS">BSCS</option>
        </select>

        <label>Address</label>
        <input type="text" class="form-control mb-3" id="address">

        <button id="editBtn" class="btn btn-success">Edit Profile</button>
        <button type="button" class="btn btn-secondary" onclick="window.location.href='user-dashboard.html'">Cancel</button>
    </div>

    <!-- Toast -->
    <div class="position-fixed start-50 translate-middle-x p-3" style="top: 50px; z-index: 11;">
        <div id="liveToast" class="toast align-items-center text-bg-success border-0" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body" id="toastBody">Toast message</div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
